<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Emotion Game</title>

<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&family=Nunito:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  min-height:100vh;
  background-image: url("parts/background/fond_index.png");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* container */
.container{
  position: relative;
  width: 100vw;
  height: 100vh;
}

/* boutons */
button{
  all:unset;
  cursor:pointer;
  display:inline-block;
  position: absolute;
}

/* images */
button img{
  display:block;
  height:auto;
}

/* =========================
   POSITIONS
   ========================= */

.btn-guess{
  left: calc(50% - 440px);
  top: calc(50% - 50px);
}

.btn-library{
  left: calc(50% + 50px);
  top: calc(50% - 100px);
}

/* =========================
   TAILLES FIXES PROPRES
   ========================= */

.btn-guess img{
  max-width:200px;
}

.btn-library img{
  max-width:340px;
}

/* IMPORTANT : les hover doivent avoir EXACTEMENT la même taille */
.guess-normal,
.guess-hover{
  max-width:200px;
  display:block;
}

.library-normal,
.library-hover{
  max-width:340px;
  display:block;
}

/* =========================
   HOVER SYSTEM
   ========================= */

/* cache toutes les hover images */
.guess-hover,
.library-hover{
  display:none;
}

/* guess hover */
.btn-guess:hover .guess-normal{
  display:none;
}

.btn-guess:hover .guess-hover{
  display:block;
}

/* library hover */
.btn-library:hover .library-normal{
  display:none;
}

.btn-library:hover .library-hover{
  transform: scale(1.5);
  transform-origin: center;
  display:block;
  margin-top:80px;
}


.popup{
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  z-index:9999;
}

/* image popup plein écran */
.popup-img{
  width:100%;
  height:109%;
  object-fit:cover; /* IMPORTANT : remplit l'écran sans déformation */
  display:block;
  margin-top:-16px;

}

/* croix */
.close-btn{
  position:absolute;
  top:-15px;
  right:2px;
  width:40px;
  cursor:pointer;
  height:20%;
  width:8%;
}

.popup{
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}
@keyframes fadeOut{
  from{opacity:1;}
  to{opacity:0;}
}
.popup.closing{
  animation: fadeOut 0.4s ease forwards;
}
.info-btn {
  position: fixed;
  top: 8%; left: 95.5%;
  transform: translate(-50%, -50%);
  width: 60px; height: 60px;
  border-radius: 50%;
  background: transparent;
  border: none;
  cursor: pointer;
  z-index: 100;
  transition: background 0.2s;
}
</style>
</head>

<body>
<div class="popup" id="popup">

  <img src="parts/background/popup.png" class="popup-img" alt="popup">

  <img src="parts/background/cross.png" class="close-btn" onclick="closePopup()" alt="close">

</div>
<button class="info-btn" onclick="
  const p = document.getElementById('popup');
  p.style.display = '';
  p.classList.remove('closing');
"></button>

<div class="container">

  <button onclick="location.href='guess.html'" class="btn-guess">
    <img class="guess-normal" src="parts/background/boutton_guess.png" alt="">
    <img class="guess-hover" src="parts/background/boutton_guess_hover.png" alt="">
  </button>

  <button onclick="location.href='library.html'"class="btn-library">
    <img class="library-normal" src="parts/background/boutton_library.png" alt="">
    <img class="library-hover" src="parts/background/boutton_library_hover.png" alt="">
  </button></div>
<script>
function closePopup(){
  const popup = document.getElementById("popup");
  popup.classList.add("closing");
  setTimeout(() => popup.style.display = "none", 400);
}

if (new URLSearchParams(window.location.search).get('nopopup')) {
  document.getElementById("popup").style.display = "none";
}
</script>
</body>
</html>
